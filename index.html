<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DudisAdventure</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>

/* Floating Hint */
#ig-hint {
  display: none;
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 999;

  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);

  padding: 10px 14px;
  border-radius: 12px;

  font-size: 13px;
  color: #111;

  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
  border: 1px solid rgba(0,0,0,0.05);

  animation: fadeIn 0.6s ease;
}

/* Text spacing */
#ig-hint span {
  display: block;
  margin-bottom: 6px;
}

/* Curved Arrow */
.arrow {
  width: 40px;
  height: 40px;
  border-right: 2px solid #22c55e;
  border-top: 2px solid #22c55e;
  border-radius: 50%;
  transform: rotate(45deg);
  margin-left: auto;

  /* Pulsing animation */
  animation: pulse 1.6s infinite;
}

/* Animations */
@keyframes pulse {
  0% {
    transform: rotate(45deg) scale(1);
    opacity: 1;
  }
  50% {
    transform: rotate(45deg) scale(1.15);
    opacity: 0.6;
  }
  100% {
    transform: rotate(45deg) scale(1);
    opacity: 1;
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f7f9fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #111;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      text-align: center;
    }

    .profile {
      margin-bottom: 40px;
    }

    .profile img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 2px solid #e5e7eb;
    }

    .profile h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .profile p {
      font-size: 14px;
      color: #666;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: block;
      padding: 16px;
      border-radius: 12px;
      background: white;
      text-decoration: none;
      color: #111;
      font-weight: 500;
      border: 1px solid #e5e7eb;

      /* Animation */
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .link-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(34, 197, 94, 0.08); /* hellgrün */
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .link-btn:hover {
      transform: translateY(-3px);
      border-color: #22c55e;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .link-btn:hover::after {
      opacity: 1;
    }

    .link-btn:active {
      transform: scale(0.97);
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div id="ig-hint">
  <span>Open in Browser</span>
  <div class="arrow"></div>
</div> 

  <div class="container">

    <div class="profile">
      <img src="https://via.placeholder.com/100" alt="Profile">
      <h1>DudisAdventure</h1>
      <p>Travel • Fitness • Lifestyle</p>
    </div>

    <div class="links">
      <a href="https://protonvpn.com/l/special-partner-offer-new" class="link-btn">70% off Proton VPN</a>
      <a href="https://www.youtube.com/@DudisAdventure" class="link-btn">YouTube</a>
      <a href="https://www.instagram.com/dudisadventuree/" class="link-btn">Instagram</a>
      <a href="https://www.tiktok.com/@dudis_adventure" class="link-btn">TikTok</a>
      <a href="mailto:davideliasmedia@proton.me" class="link-btn">Contact for Cooperations</a>

    </div>

    <footer>
      © 2026 DudisAdventure
    </footer>

  </div>

<script>
  function isInstagram() {
    return navigator.userAgent.toLowerCase().includes("instagram");
  }

  if (isInstagram()) {
    document.getElementById("ig-hint").style.display = "block";
  }
</script>

</body>
</html>
